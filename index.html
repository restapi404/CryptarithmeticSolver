<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptarithmetic Solver</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="label">AI Search — Brute Force</div>
    <h1>Cryptoarithmetic Solver</h1>
    <p class="sub">Each letter maps to a unique digit &nbsp;·&nbsp; Leading letters ≠ 0</p>
  </header>

  <div class="panel">
    <div class="panel-title">Puzzle</div>
    <div class="examples">
      <span style="font-size:11px;color:var(--muted);align-self:center">Examples →</span>
      <button class="eg" onclick="load('SEND + MORE = MONEY')">SEND + MORE = MONEY</button>
      <button class="eg" onclick="load('BASE + BALL = GAMES')">BASE + BALL = GAMES</button>
      <button class="eg" onclick="load('EAT + THAT = APPLE')">EAT + THAT = APPLE</button>
      <button class="eg" onclick="load('TO + GO = OUT')">TO + GO = OUT</button>
    </div>
    <div class="input-row">
      <input id="inp" type="text" value="SEND + MORE = MONEY"
             placeholder="WORD + WORD = WORD"
             onkeydown="if(event.key==='Enter')solve()">
      <button id="go" onclick="solve()">SOLVE →</button>
    </div>
    <p class="hint">// letters only · one + · one =</p>
  </div>

  <div class="panel" id="result"></div>

</div>
<script src="solver.js"></script>
</body>
</html>
